[window]
dimensions = { columns = 200, lines = 100 }

[font]
normal = { family = "DroidSansM Nerd Font Mono", style = "Regular" }
bold = { family = "DroidSansM Nerd Font Mono", style = "Bold" }
italic = { family = "DroidSansM Nerd Font Mono", style = "Italic" }
bold_italic = { family = "DroidSansM Nerd Font Mono", style = "Bold Italic" }

size = 60
offset = { x = 0, y = 2 }

[cursor]
style = { shape = "Block", blinking = "On"}
